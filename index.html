<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>壹趣聊天官网 - 安全私密通讯</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f7fa;
      color: #1a1a2e;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* 状态栏模拟 */
    .status-bar {
      height: 24px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 12px;
      color: #333;
    }
    .status-bar .time { font-weight: 500; }
    .status-bar .right { display: flex; align-items: center; gap: 4px; }
    .status-bar .battery::after { content: '84%'; margin-left: 2px; }
    .status-bar .dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; }

    /* 浏览器标题栏 */
    .browser-bar {
      height: 44px;
      background: #fff;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      border-bottom: 1px solid #eee;
    }
    .browser-bar .search-icon,
    .browser-bar .shield-icon,
    .browser-bar .star-icon,
    .browser-bar .tools-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .browser-bar .title {
      flex: 1;
      font-size: 13px;
      color: #333;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .browser-bar .tools-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 10px;
      color: #666;
    }

    /* 主内容 */
    .main {
      max-width: 430px;
      margin: 0 auto;
      background: linear-gradient(180deg, #e8f4fc 0%, #f0f7fc 35%, #f5f7fa 100%);
      min-height: calc(100vh - 24px - 44px);
      position: relative;
      overflow: hidden;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    /* Hero 顶部导航 */
    .hero-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 18px;
      font-weight: 700;
      color: #1e3a5f;
    }
    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg {
      width: 18px;
      height: 18px;
      stroke: #fff;
    }
    .menu-btn {
      width: 24px;
      height: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }
    .menu-btn span {
      display: block;
      height: 2px;
      background: #334155;
      border-radius: 1px;
    }

    /* 背景波纹 */
    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .hero-bg .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(59, 130, 246, 0.08);
    }
    .hero-bg .c1 { width: 200px; height: 200px; top: -60px; right: -40px; }
    .hero-bg .c2 { width: 140px; height: 140px; top: 120px; left: -50px; }
    .hero-bg .c3 { width: 80px; height: 80px; top: 200px; right: 20px; }
    .hero-bg .c4 { width: 100px; height: 100px; bottom: 180px; left: 10px; }
    .hero-bg .c5 { width: 60px; height: 60px; bottom: 100px; right: 60px; }

    /* Hero 主体 */
    .hero {
      position: relative;
      padding: 24px 24px 36px;
      text-align: center;
    }
    .hero h1 {
      font-size: 26px;
      font-weight: 700;
      color: #1e3a5f;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .hero .slogan {
      font-size: 15px;
      color: #1e3a5f;
      margin-bottom: 6px;
      font-weight: 500;
    }
    .hero .desc {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 28px;
    }
    .download-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 140px;
      height: 44px;
      padding: 0 20px;
      background: #475569;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      border-radius: 12px;
      border: none;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }
    .download-btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }
    .download-btn:active { opacity: 0.9; }

    /* 核心优势 */
    .advantages {
      padding: 28px 20px 100px;
      background: #f5f7fa;
    }
    .advantages h2 {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: 6px;
    }
    .advantages .sub {
      font-size: 13px;
      color: #64748b;
      text-align: center;
      margin-bottom: 20px;
    }
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      min-height: 100px;
    }
    .card.highlight {
      grid-column: span 2;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
      border: 1px solid #bbf7d0;
    }
    .card.highlight .icon-wrap { background: #22c55e; }
    .card.highlight .card-title { color: #166534; font-size: 18px; }
    .card.highlight .card-desc { color: #15803d; }
    .icon-wrap {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #eff6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }
    .card.highlight .icon-wrap { margin-bottom: 0; }
    .icon-wrap svg { width: 22px; height: 22px; }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 11px;
      color: #64748b;
      line-height: 1.4;
    }
    .card.highlight .time-num {
      font-size: 20px;
      font-weight: 700;
      color: #22c55e;
      margin-left: auto;
    }

    /* 底部导航栏 */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      min-height: 56px;
      padding: 8px 16px calc(8px + env(safe-area-inset-bottom, 0));
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: space-around;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
      z-index: 100;
    }
    .bottom-nav .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      color: #64748b;
      font-size: 10px;
      text-decoration: none;
      position: relative;
    }
    .bottom-nav .nav-item .icon {
      width: 24px;
      height: 24px;
    }
    .bottom-nav .nav-item .badge {
      position: absolute;
      top: -2px;
      right: -6px;
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
    }
    .bottom-nav .nav-item.home { color: #3b82f6; }
  </style>
</head>
